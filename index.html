<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACCESS TERMINAL</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff41;
    font-family: monospace;
    overflow: hidden;
}

/* MATRIX CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* TERMINAL BOX */
.terminal {
    padding: 40px;
    max-width: 900px;
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 15px #00ff41;
}

.line {
    margin: 10px 0;
}

/* blinking cursor */
.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff41;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* glow effect */
.glow {
    text-shadow:
        0 0 5px #00ff41,
        0 0 10px #00ff41,
        0 0 20px #00ff41;
}

body{
    background:black;
    color:#00ff00;
    font-family:monospace;
}

.terminal{
    padding:40px;
    font-size:22px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">
    <pre id="bootText"></pre>
</div>

<script>
/* =========================
   MATRIX RAIN
========================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let x = 0; x < columns; x++)
    drops[x] = 1;

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff41";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        const text =
        letters.charAt(Math.floor(Math.random()*letters.length));

        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(drawMatrix,33);


/* =========================
   TYPING EFFECT
========================= */

const lines = [
"> Initializing system...",
"> Bypassing firewall...",
"> Access granted ✔",
"> Welcome, basakencana",
"> Loading personal website...",
"> STATUS: ONLINE"
];

let lineIndex = 0;
let charIndex = 0;
const typingDiv = document.getElementById("typing");

function typeLine(){
    if(lineIndex < lines.length){

        if(charIndex < lines[lineIndex].length){
            typingDiv.innerHTML += lines[lineIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeLine,40);
        } else {
            typingDiv.innerHTML += "<br>";
            lineIndex++;
            charIndex = 0;
            setTimeout(typeLine,500);
        }

    } else {
        typingDiv.innerHTML += '<span class="cursor"></span>';
    }
}

typeLine();

<script>

/* =========================
   IP SCANNER ANIMATION
========================= */

const scanner = document.createElement("div");
scanner.style.marginTop = "30px";
scanner.style.fontSize = "18px";
document.querySelector(".terminal").appendChild(scanner);

function randomIP(){
    return "192.168." +
        Math.floor(Math.random()*255) + "." +
        Math.floor(Math.random()*255);
}

const statusList = [
    "ONLINE",
    "OPEN PORTS",
    "SECURED",
    "RESPONDING",
    "VULNERABLE",
    "TIMEOUT"
];

function scanIP(){

    const line = document.createElement("div");

    const ip = randomIP();
    const status =
        statusList[Math.floor(Math.random()*statusList.length)];

    line.textContent = "> scanning " + ip + " ... " + status;

    scanner.appendChild(line);

    // auto scroll
    window.scrollTo(0, document.body.scrollHeight);

    // limit lines
    if(scanner.children.length > 15){
        scanner.removeChild(scanner.firstChild);
    }
}

setInterval(scanIP, 800);


/* =========================
   HACKER BOOT SEQUENCE
========================= */

const bootLines = [
"SYSTEM ACCESS",
"> Initializing system...",
"> Bypassing firewall...",
"> Access granted ✔",
"> Welcome, basakencana",
"> Loading personal website...",
"> STATUS: ONLINE"
];

const boot = document.getElementById("bootText");

let lineIndex = 0;
let charIndex = 0;

function typeBoot(){

    if(lineIndex < bootLines.length){

        if(charIndex < bootLines[lineIndex].length){
            boot.textContent += bootLines[lineIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeBoot, 35);
        }else{
            boot.textContent += "\n";
            lineIndex++;
            charIndex = 0;
            setTimeout(typeBoot, 400);
        }

    }
}

typeBoot();

</script>

</body>
</html>
