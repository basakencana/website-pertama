<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACCESS TERMINAL</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff41;
    font-family:monospace;
    overflow:hidden;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.terminal{
    padding:40px;
    max-width:900px;
}

.cursor{
    display:inline-block;
    width:10px;
    background:#00ff41;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">
<pre id="bootText"></pre>
</div>

<script>

/* ================= MATRIX RAIN ================= */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){
 ctx.fillStyle="rgba(0,0,0,0.05)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#00ff41";
 ctx.font=fontSize+"px monospace";

 for(let i=0;i<drops.length;i++){
   const text=letters[Math.floor(Math.random()*letters.length)];
   ctx.fillText(text,i*fontSize,drops[i]*fontSize);

   if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

   drops[i]++;
 }
}

setInterval(drawMatrix,33);


/* ================= TERMINAL BOOT ================= */

const lines=[
"SYSTEM ACCESS",
"> Initializing system...",
"> Bypassing firewall...",
"> Access granted ✔",
"> Welcome, basakencana",
"> Loading personal website...",
"> STATUS: ONLINE"
];

const boot=document.getElementById("bootText");

let lineIndex=0;
let charIndex=0;

function typeBoot(){

 if(lineIndex<lines.length){

   if(charIndex<lines[lineIndex].length){
      boot.textContent+=lines[lineIndex][charIndex];
      charIndex++;
      setTimeout(typeBoot,35);
   }else{
      boot.textContent+="\n";
      lineIndex++;
      charIndex=0;
      setTimeout(typeBoot,400);
   }
 }else{
   boot.innerHTML+='<span class="cursor"></span>';
 }
}

typeBoot();

/* =========================
   VISITOR IP DETECTOR
========================= */

async function showVisitorIP(){

    try{

        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();

        boot.textContent +=
`\n> Detecting visitor...
> IP Address: ${data.ip}
> City: ${data.city}
> Country: ${data.country_name}
> STATUS: CONNECTED\n`;

    }catch(error){

        boot.textContent +=
"\n> Unable to detect IP\n";
    }
}

/* jalankan setelah boot selesai */
setTimeout(showVisitorIP, 4000);

</script>

</body>
</html>
