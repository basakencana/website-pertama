<script>
async function trackVisitor() {
    try {
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();

        const visitor = {
            ip: data.ip,
            country: data.country_name,
            city: data.city,
            browser: navigator.userAgent,
            time: new Date().toLocaleString()
        };

        console.log("Visitor:", visitor);

        // kirim ke webhook (next step)
        fetch("YOUR_WEBHOOK_URL", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(visitor)
        });

    } catch (e) {
        console.log("Tracker error");
    }
}

trackVisitor();
</script>

<script>

/* ================= MATRIX RAIN ================= */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize=14;
const columns=canvas.width/fontSize;
const drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){
 ctx.fillStyle="rgba(0,0,0,0.05)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="#00ff41";
 ctx.font=fontSize+"px monospace";

 for(let i=0;i<drops.length;i++){
   const text=letters[Math.floor(Math.random()*letters.length)];
   ctx.fillText(text,i*fontSize,drops[i]*fontSize);

   if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

   drops[i]++;
 }
}

setInterval(drawMatrix,33);


/* ================= TERMINAL BOOT ================= */

const lines=[
"SYSTEM ACCESS",
"> Initializing system...",
"> Bypassing firewall...",
"> Access granted ✔",
"> Welcome, basakencana",
"> Loading personal website...",
"> STATUS: ONLINE"
];

const boot=document.getElementById("bootText");

let lineIndex=0;
let charIndex=0;

function typeBoot(){

 if(lineIndex<lines.length){

   if(charIndex<lines[lineIndex].length){
      boot.textContent+=lines[lineIndex][charIndex];
      charIndex++;
      setTimeout(typeBoot,35);
   }else{
      boot.textContent+="\n";
      lineIndex++;
      charIndex=0;
      setTimeout(typeBoot,400);
   }
 }else{
   boot.innerHTML+='<span class="cursor"></span>';
 }
}

typeBoot();

   VISITOR IP DETECTOR
========================= */

        const response = await fetch("https://ipapi.co/json/");

        boot.textContent +=
`\n> Detecting visitor...
> IP Address: ${data.ip}
> City: ${data.city}
> Country: ${data.country_name}
> STATUS: CONNECTED\n`;

    }catch(error){

        boot.textContent +=
"\n> Unable to detect IP\n";
    }
}

/* =========================
   TERMINAL COMMAND SYSTEM
========================= */

const input = document.getElementById("commandInput");
const output = document.getElementById("output");

input.addEventListener("keydown", async function(e){

    if(e.key === "Enter"){

        const cmd = input.value.trim();
        output.innerHTML += "> " + cmd + "<br>";

        // COMMAND: help
        if(cmd === "help"){
            output.innerHTML +=
            "Available commands:<br>" +
            "help<br>" +
            "whoami<br>" +
            "ip<br><br>";
        }

        // COMMAND: IP
        else if(cmd === "ip" || cmd === "whoami"){

            output.innerHTML += "Fetching IP...<br>";

            try{
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();

                output.innerHTML +=
                    "Your IP: " + data.ip + "<br><br>";


            }catch{
                output.innerHTML += "Failed to get IP<br>";
            }
        }

        else{
            output.innerHTML += "Command not found<br><br>";
        }

        input.value = "";
        window.scrollTo(0, document.body.scrollHeight);
    }
});

</script>
